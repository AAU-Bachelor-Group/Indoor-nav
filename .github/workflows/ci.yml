name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # LINT
      - name: Run ESLint
        run: npm run lint

      # PRETTIER CHECK (fails if not formatted)
      - name: Check formatting
        run: npm run format

      # TYPESCRIPT STRICT CHECK
      - name: TypeScript check
        run: npx tsc --noEmit

      # TODO: UNIT TESTS ADD HERE

      # BUILD PROJECT
      - name: Build project
        run: npm run build
