name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # LINT
      - name: Run ESLint
        run: pnpm run lint

      # PRETTIER CHECK (fails if not formatted)
      - name: Check formatting
        run: pnpm run format

      # TYPESCRIPT STRICT CHECK
      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      # TODO: UNIT TESTS ADD HERE

      # BUILD PROJECT
      - name: Build project
        run: pnpm run build
